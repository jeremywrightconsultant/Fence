<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Name - Proof of Concept</title>

<link rel="icon" type="image/png" href="2K_PDF_Markup_Master_V01_01_18_512x512.png">

<style>
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background-color: #FFFFFF;
color: #36454F;
margin: 0;
padding: 0;
line-height: 1.6;
}

h1, h2, h3 {
color: #1B365D;
margin-bottom: 10px;
}

.container {
max-width: 1100px;
margin: 0 auto;
padding: 20px;
}

header {
text-align: center;
padding: 60px 20px;
border-bottom: 4px solid #1B365D;
margin-bottom: 40px;
}

.company-logo {
max-width: 300px;
height: auto;
margin-bottom: 20px;
}

section {
margin-bottom: 60px;
}

/* Shop Layout: Products on left, Cart on right */
.shop-layout {
display: flex;
gap: 30px;
flex-wrap: wrap; /* Allows stacking on smaller screens */
}

.catalog-section {
flex: 2; /* Takes up 2/3 of the space */
min-width: 300px;
}

.catalog-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 20px;
}

.product-card {
border: 1px solid #EAEAEA;
padding: 20px;
text-align: center;
transition: box-shadow 0.3s ease;
display: flex;
flex-direction: column;
justify-content: space-between;
}

.product-card:hover {
box-shadow: 0 4px 12px rgba(27, 54, 93, 0.1);
}

.product-image {
width: 100%;
height: 200px;
object-fit: cover;
margin-bottom: 15px;
display: block;
}

/* Cart Styling */
.cart-container {
flex: 1; /* Takes up 1/3 of the space */
min-width: 250px;
background: #F9F9F9;
border: 1px solid #EAEAEA;
padding: 20px;
height: fit-content;
}

.cart-item {
display: flex;
justify-content: space-between;
border-bottom: 1px solid #EAEAEA;
padding: 10px 0;
font-size: 0.9em;
}

.cart-total {
font-size: 1.2em;
font-weight: bold;
text-align: right;
margin-top: 20px;
color: #1B365D;
}

/* Global Button Styling */
button {
background-color: #1B365D;
color: #FFFFFF;
border: none;
padding: 12px 24px;
font-size: 16px;
cursor: pointer;
font-weight: bold;
letter-spacing: 0.5px;
transition: background-color 0.2s ease;
width: 100%;
margin-top: 15px;
<div class="shop-layout">

<div class="catalog-section">
<h2>Product Catalog</h2>
<div class="catalog-grid">
<div class="product-card">
<img src="Alpha_1.png" alt="Product Alpha" class="product-image">
<div>
<h3>Product Alpha</h3>
<p>Minimal description detailing the core specifications.</p>
<p><strong>$150.00</strong></p>
</div>
<button onclick="addToCart('Product Alpha', 150.00)">Add to Cart</button>
</div>

<div class="product-card">
<img src="beta_1.jpg" alt="Product Beta" class="product-image">
<div>
<h3>Product Beta</h3>
<p>Minimal description detailing the core specifications.</p>
<p><strong>$225.00</strong></p>
</div>
<button onclick="addToCart('Product Beta', 225.00)">Add to Cart</button>
</div>

<div class="product-card">
<img src="gama_1.jpg" alt="Product Gamma" class="product-image">
<div>
<h3>Product Gamma</h3>
<p>Minimal description detailing the core specifications.</p>
<p><strong>$300.00</strong></p>
</div>
<button onclick="addToCart('Product Gamma', 300.00)">Add to Cart</button>
</div>
</div>
</div>

<div class="cart-container">
<h2>Your Cart 🛒</h2>

<div id="cart-items-list">
<p>Your cart is empty.</p>
</div>

<div class="cart-total">
Total: $<span id="cart-total-price">0.00</span>
</div>

<button onclick="alert('This is a POC. In production, this will route to a payment gateway.')">Checkout</button>
</div>

</div> <hr style="border: 0; border-top: 1px solid #EAEAEA; margin: 40px 0;">
<script>
let cart = [];
let cartTotal = 0;

function addToCart(itemName, itemPrice) {
cart.push({ name: itemName, price: itemPrice });
cartTotal += itemPrice;
updateCartDisplay();
}

function updateCartDisplay() {
const cartListElement = document.getElementById('cart-items-list');
const totalElement = document.getElementById('cart-total-price');

cartListElement.innerHTML = '';

cart.forEach(function(item) {
cartListElement.innerHTML += `
<div class="cart-item">
<span>${item.name}</span>
<span>$${item.price.toFixed(2)}</span>
</div>
`;
});

totalElement.innerText = cartTotal.toFixed(2);
}
</script>

</body>
</html>
